---
name: continuous integration

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUSTUP_TOOLCHAIN: nightly-2024-12-14

jobs:
  quality-control:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    steps:
      -
        uses: actions/checkout@v4
      -
        if: contains(matrix.os, 'ubuntu')
        uses: ./.github/actions/free-disk-space
      -
        if: contains(matrix.os, 'ubuntu')
        uses: ./.github/actions/ubuntu
      -
        if: contains(matrix.os, 'macos')
        uses: ./.github/actions/macos-dependencies
      -
        name: toolchain-pin
        run: rustup override set ${RUSTUP_TOOLCHAIN}
      -
        name: compile
        run: cargo build --locked --workspace
        timeout-minutes: 90
      -
        name: clippy
        run: SKIP_WASM_BUILD=1 cargo clippy --locked --workspace
        timeout-minutes: 30
      -
        name: test
        run: SKIP_WASM_BUILD=1 cargo test --locked --workspace
        timeout-minutes: 15
      -
        name: docs
        run: SKIP_WASM_BUILD=1 cargo doc --locked --workspace --no-deps
        timeout-minutes: 15
